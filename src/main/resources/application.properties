# Application
spring.application.name=Visitor Route Guidance & Tracking System
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:vrgtdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT
app.jwt.secret=VRGTSystemSecretKeyForJWTTokenGenerationAndValidation2024SecureKey256Bit!
app.jwt.expiration=86400000

# QR Code AES Encryption
app.qr.aes-key=VRGT2024AES256KY

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.example.Application=DEBUG
logging.level.org.springframework.security=INFO
