# Application
spring.application.name=Smart Hotel Visitor Route Guidance & Tracking System
server.port=8080

# Active profile: h2 (dev default) | mysql (production)
# Override with: --spring.profiles.active=mysql
spring.profiles.active=default

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# H2 Database
spring.datasource.url=jdbc:h2:mem:vrgtdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT
app.jwt.secret=VRGTSystemSecretKeyForJWTTokenGenerationAndValidation2024SecureKey256Bit!
app.jwt.expiration=86400000

# QR Code AES Encryption
app.qr.aes-key=VRGT2024AES256KY

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.example.Application=DEBUG
logging.level.org.springframework.security=INFO

# MSG91 OTP Integration
msg91.api-key=511618AJSz0NHbyw69ec6d8bP1
msg91.sms.template-id=YOUR_DLT_TEMPLATE_ID
msg91.sms.sender-id=VRGTSY
msg91.email.template-id=YOUR_EMAIL_TEMPLATE_ID
msg91.email.from=noreply@vrgt.in
msg91.email.from-name=VRGT System
msg91.email.domain=vrgt.in
msg91.whatsapp.integrated-number=YOUR_WHATSAPP_INTEGRATED_NUMBER
msg91.whatsapp.template-name=vrgt_visitor_otp
