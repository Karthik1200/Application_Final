<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Pre-Registration - VRGT System</title>
    <meta name="description" content="Pre-register your visit with OTP verification and receive a dynamic QR pass">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="register-page">
    <div class="register-container">
        <div class="register-card">
            <div class="login-brand">
                <div class="icon">📋</div>
                <h1>Visitor Pre-Registration</h1>
                <p>Fill in your details to receive a QR pass</p>
            </div>

            <!-- Step 1: Registration Form -->
            <div id="step1">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" class="form-control" placeholder="john@company.com" required>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="phone">Phone *</label>
                            <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210" required>
                        </div>
                        <div class="form-group">
                            <label for="company">Company</label>
                            <input type="text" id="company" class="form-control" placeholder="Company Name">
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="idType">ID Type</label>
                            <select id="idType" class="form-control">
                                <option value="Aadhar">Aadhar Card</option>
                                <option value="Passport">Passport</option>
                                <option value="DrivingLicense">Driving License</option>
                                <option value="PAN">PAN Card</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="idNumber">ID Number</label>
                            <input type="text" id="idNumber" class="form-control" placeholder="Enter ID number">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="purpose">Purpose of Visit *</label>
                        <input type="text" id="purpose" class="form-control" placeholder="Meeting, Interview, Delivery, etc." required>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="hostName">Host Name *</label>
                            <input type="text" id="hostName" class="form-control" placeholder="Person you're visiting" required>
                        </div>
                        <div class="form-group">
                            <label for="hostEmail">Host Email</label>
                            <input type="email" id="hostEmail" class="form-control" placeholder="host@company.com">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="registerBtn">
                        Register & Get OTP
                    </button>
                </form>
                <div class="login-footer">
                    <a href="/login">← Back to Login</a>
                </div>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="step2" class="hidden">
                <div class="otp-section">
                    <h2 style="margin-bottom:8px;">Verify OTP</h2>
                    <p class="text-muted text-sm">Enter the OTP sent to your email/phone</p>
                    <p id="otpDisplay" style="margin-top:12px; padding:12px; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); border-radius:8px; color:#34d399; font-size:14px;"></p>
                    <input type="text" id="otpInput" class="form-control otp-input" maxlength="6" placeholder="000000">
                    <button class="btn btn-success btn-lg" style="width:100%;max-width:280px;" onclick="verifyOtp()">Verify OTP</button>
                </div>
            </div>

            <!-- Step 3: QR Pass -->
            <div id="step3" class="hidden">
                <div class="qr-pass-section">
                    <h2 style="margin-bottom:8px; color: var(--success-light);">✓ Registration Complete!</h2>
                    <p class="text-muted text-sm">Show this QR code at the gate</p>
                    <img id="qrImage" src="" alt="QR Pass">
                    <p style="font-size:13px; color:var(--text-muted); margin-top:8px;">Pass expires in 24 hours</p>
                    <div class="mt-4">
                        <button class="btn btn-primary" onclick="window.print()">🖨 Print Pass</button>
                        <button class="btn btn-outline" onclick="window.location.href='/login'" style="margin-left:8px;">Done</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
let registeredVisitorId = null;

async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Registering...';
    btn.disabled = true;

    const result = await API.post('/api/visitor/register', {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        company: document.getElementById('company').value,
        idType: document.getElementById('idType').value,
        idNumber: document.getElementById('idNumber').value,
        purpose: document.getElementById('purpose').value,
        hostName: document.getElementById('hostName').value,
        hostEmail: document.getElementById('hostEmail').value
    });

    if (result.success) {
        registeredVisitorId = result.data.visitorId;
        document.getElementById('otpDisplay').textContent =
            'Demo OTP: ' + result.data.otp + ' (In production, sent via SMS/Email)';
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        Toast.success('Registration successful! Please verify OTP.');
    } else {
        Toast.error(result.message);
        btn.textContent = 'Register & Get OTP';
        btn.disabled = false;
    }
}

async function verifyOtp() {
    const otp = document.getElementById('otpInput').value;
    if (otp.length < 4) { Toast.error('Please enter a valid OTP'); return; }

    const result = await API.post('/api/visitor/verify-otp', {
        visitorId: registeredVisitorId.toString(),
        otp: otp
    });

    if (result.success) {
        const visitor = result.data;
        if (visitor.qrImageBase64) {
            document.getElementById('qrImage').src = 'data:image/png;base64,' + visitor.qrImageBase64;
        }
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        Toast.success('OTP verified! Your QR pass is ready.');
    } else {
        Toast.error(result.message);
    }
}
</script>
</body>
</html>
