<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VRGT System</title>
    <meta name="description" content="Visitor Route Guidance & Tracking System - Secure Login Portal">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="icon">🏢</div>
                <h1>VRGT System</h1>
                <p>Visitor Route Guidance & Tracking</p>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div id="loginError" class="hidden" style="padding:12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#f87171;font-size:14px;margin-bottom:20px;text-align:center;"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                <a href="/register">Pre-register as a Visitor →</a>
            </div>

            <div class="demo-credentials">
                <h4>Demo Credentials</h4>
                <div class="cred"><span>Admin</span><span>admin / admin123</span></div>
                <div class="cred"><span>Guard</span><span>guard1 / guard123</span></div>
                <div class="cred"><span>Reception</span><span>reception1 / reception123</span></div>
                <div class="cred"><span>Host</span><span>host1 / host123</span></div>
            </div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errDiv = document.getElementById('loginError');
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errDiv.classList.add('hidden');

    const result = await API.post('/api/auth/login', {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    });

    if (result.success) {
        const role = result.data.role;
        localStorage.setItem('user', JSON.stringify(result.data));
        // Role-based redirect
        if (role === 'ADMIN') window.location.href = '/admin';
        else if (role === 'SECURITY_GUARD') window.location.href = '/gate';
        else if (role === 'RECEPTIONIST') window.location.href = '/reception';
        else if (role === 'HOST') window.location.href = '/tracking';
        else window.location.href = '/admin';
    } else {
        errDiv.textContent = result.message || 'Login failed';
        errDiv.classList.remove('hidden');
        btn.textContent = 'Sign In';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
